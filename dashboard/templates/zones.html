<!DOCTYPE html>
<html>

<body>

<h1>Zone Analysis</h1>

<table border="1">

<tr>
<th>Zone</th>
<th>Traffic</th>
<th>AQI</th>
<th>Road</th>
<th>Transport</th>
<th>UFI</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row.Zone }}</td>

<td>{{ row.TrafficScore }}</td>

<td>{{ row.AQIScore }}</td>

<td>{{ row.RoadScore }}</td>

<td>{{ row.TransportScore }}</td>

<td>{{ row.UFI }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
