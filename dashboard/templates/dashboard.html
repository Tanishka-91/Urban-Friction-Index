<!DOCTYPE html>
<html>

<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>UFI Dashboard</h1>

<canvas id="ufiChart"></canvas>

<script>

const zones =
{{ zones|tojson }};

const ufi =
{{ ufi|tojson }};

new Chart(
document.getElementById("ufiChart"),
{
type:"bar",

data:{

labels:zones,

datasets:[{
label:"Urban Friction Index",

data:ufi,

backgroundColor:"skyblue"
}]
}
}
);

</script>

</body>

</html>
